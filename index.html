<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Trade Esportivo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="auth-container">
        <button id="btn-login">Login com Google</button>
    </div>

    <div id="dashboard" style="display:none;">
        <h1>Seu Painel de Performance</h1>
        <input type="file" id="csvFile" accept=".csv" />
        
        <div class="cards">
            <div class="card"><h3>Lucro Líquido</h3><p id="lucro">R$ 0,00</p></div>
            <div class="card"><h3>Status de Risco</h3><p id="risco-status">Monitorando...</p></div>
        </div>

        <canvas id="meuGrafico" style="max-width: 600px; margin-top: 20px;"></canvas>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
