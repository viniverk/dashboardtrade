<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TradeEsportivo Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
</head>
<body>
    <div id="auth-container">
        <div class="login-box">
            <h2>Acesse o seu Dashboard</h2>
            <button id="btn-login">Login com Google</button>
        </div>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="cards">
            <div class="card"><h3>Lucro Líquido</h3><p id="lucro">R$ 0,00</p></div>
            <div class="card"><h3>Custos (Dia 16)</h3><p>R$ 150,00</p></div>
        </div>

        <div class="filtros-container">
            <select id="filtro-estrategia"><option value="TODAS">Todas</option><option value="MO">Match Odds</option><option value="LG">Lay Goleada</option></select>
            <select id="tipo-grafico"><option value="bar">Barras</option><option value="line">Linhas</option></select>
        </div>

        <div class="chart-container" style="height: 300px; width: 100%; background: white;">
            <canvas id="meuGrafico"></canvas>
        </div>

        <table id="tabela-operacoes" style="width:100%; margin-top:20px;">
            <thead><tr><th>Mercado</th><th>Data</th><th>Resp.</th><th>Lucro/Perda</th></tr></thead>
            <tbody id="corpo-tabela"></tbody>
        </table>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
